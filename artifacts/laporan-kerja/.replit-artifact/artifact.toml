kind = "web"
previewPath = "/"
title = "LAPORAN KERJA DLH"
version = "1.0.0"
id = "artifacts/laporan-kerja"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19762

[services.development]
run = "pnpm --filter @workspace/laporan-kerja run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/laporan-kerja", "run", "build" ]
publicDir = "artifacts/laporan-kerja/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19762"
BASE_PATH = "/"
